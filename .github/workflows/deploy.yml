name: Deploy Ylyto to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Detect build output folder
        run: |
          echo "Searching for index.html..."
          find . -maxdepth 4 -type f -name "index.html"

          if [ -f "dist/index.html" ]; then
            echo "PUBLIC_DIR=dist" >> $GITHUB_ENV
          elif [ -f "dist/client/index.html" ]; then
            echo "PUBLIC_DIR=dist/client" >> $GITHUB_ENV
          elif [ -f ".output/public/index.html" ]; then
            echo "PUBLIC_DIR=.output/public" >> $GITHUB_ENV
          else
            echo "No valid build output found"
            echo "Available folders:"
            find . -maxdepth 3 -type d
            exit 1
          fi

      - name: Fix SPA routing and custom domain
        run: |
          echo "Using public folder: $PUBLIC_DIR"
          cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR/404.html"
          touch "$PUBLIC_DIR/.nojekyll"
          echo "ylyto.ma" > "$PUBLIC_DIR/CNAME"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload build files
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.PUBLIC_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
