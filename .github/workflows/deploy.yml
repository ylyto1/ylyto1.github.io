name: Deploy Ylyto to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Prepare static SPA output
        run: |
          # TanStack Start SPA build emits the prerendered shell + client assets
          # under dist/client. Promote that directory to the upload root, add
          # the SPA 404 fallback so deep links work on GitHub Pages, and pin
          # the custom domain.
          if [ ! -f "dist/client/index.html" ]; then
            echo "::error::dist/client/index.html missing — SPA build did not produce a shell"
            ls -R dist || true
            exit 1
          fi

          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll
          echo "ylyto.ma" > dist/client/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload build files
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/client

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
